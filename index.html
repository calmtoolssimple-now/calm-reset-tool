<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm Reset Tool</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #f8f4ef, #eef6f3);
  color: #3e4a42;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.header-image {
  width: 100%;
  max-width: 600px;
  display: block;
  margin: 0 auto 15px;
  border-radius: 15px;
}

select, button, input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  background: #6e9385;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  padding: 20px;
  background: #f4f9f7;
  border-radius: 15px;
  display: none;
}

.product-card {
  background: white;
  border-radius: 12px;
  padding: 12px;
  margin-top: 10px;
  border: 1px solid #ddd;
}

.book-card {
  margin-top: 20px;
  padding: 15px;
  background: #fff;
  border-radius: 12px;
  border: 2px solid #6e9385;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<img src="calmheader.png" class="header-image">

<h2>Calm Reset Tool</h2>

<label>Stress Level</label>
<input type="range" id="stress" min="1" max="10" value="5">

<label>How do you feel?</label>
<select id="feeling">
<option>Anxious</option>
<option>Overwhelmed</option>
<option>Tired</option>
<option>Irritable</option>
<option>Foggy</option>
</select>

<label>Time Available</label>
<select id="time">
<option value="1">1 minute</option>
<option value="5">5 minutes</option>
<option value="15">15 minutes</option>
</select>

<label>Where are you?</label>
<select id="place">
<option>At home</option>
<option>At work</option>
<option>On the go</option>
</select>

<button onclick="generateCalm()">Get My Calm Plan</button>

<div id="result" class="result"></div>
<div id="emailSection" style="display:none;">
  <input type="email" id="userEmail" placeholder="Enter your email to receive your plan 💚">
  <button onclick="sendEmail()">Send My Plan</button>
  <p
</div>
</div>

<script>

function generateCalm(){

let stress = parseInt(document.getElementById("stress").value);
let feeling = document.getElementById("feeling").value;
let place = document.getElementById("place").value;

let plan = "";
let mantra = "";

if(feeling==="Anxious"){
plan = "• Press your feet into the floor\n• Massage behind your ears for 20 seconds\n• Breathe in for 4, out for 6 (5 times)\n• Name 3 things you see";
mantra = "I am safe right now.";
}
else if(feeling==="Overwhelmed"){
plan = "• Take 3 slow breaths\n• Relax your shoulders\n• Focus on ONE task only\n• Pause before continuing";
mantra = "One step at a time.";
}
else if(feeling==="Tired"){
plan = "• Stretch your arms overhead\n• Take a deep breath\n• Sip water or tea\n• Sit upright near light";
mantra = "I can restore gently.";
}
else if(feeling==="Irritable"){
plan = "• Pause before reacting\n• Take a slow breath\n• Step away briefly\n• Release shoulder tension";
mantra = "I choose calm.";
}
else{
plan = "• Sit up tall\n• Take 5 slow breaths\n• Stretch gently\n• Focus on one small action";
mantra = "Clarity will come.";
}

let products = `
<h3>🌿 Recommended for you</h3>

<div class="product-card">🌸 <a href="https://amzn.to/3QxpJmh" target="_blank">Aromatherapy Diffuser Necklace</a></div>
<div class="product-card">💧 <a href="https://amzn.to/4vG0Kxj" target="_blank">Lavender Spray</a></div>
<div class="product-card">💛 <a href="https://amzn.to/4e2CkI9" target="_blank">Touch Bracelets</a></div>
`;

let book = `
<div class="book-card">
<h3>📘 Want to go deeper?</h3>
<p>This gentle guide helps you reconnect with calm, movement, and emotional ease.</p>
<a href="https://calmtools7.gumroad.com/l/calm-dance-guide" target="_blank"
style="display:inline-block; margin-top:10px; background:#6e9385; color:white; padding:10px 14px; border-radius:8px; text-decoration:none; font-weight:bold;">
Explore the Calm Dance Guide
</a>
</div>
`;

document.getElementById("result").innerHTML =
"<h2>Your Calm Reset Plan</h2><div style='white-space:pre-wrap;'>"+plan+"</div><p><strong>"+mantra+"</strong></p>"+products+book;

document.getElementById("result").style.display="block";
document.getElementById("emailSection").style.display="block";
}

</script>

</body>
</html>
