  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f6f1ec;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;

    }

    .header-image {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      display: block;
      border-radius: 0 0 18px 18px;
    }

    .card {
      background: white;

      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);

      margin: 40px auto;

    }

    @media (max-width: 600px) {
      .container { padding: 14px; }
      .card { padding: 18px; }
      h2 { font-size: 24px; }
      .header-image { max-height: 180px; }
    }

<body>

  <div class="container">
    <img src="calmheader.png" class="header-image" alt="Calm Reset Tool">

    <div class="card">
      <h2>Calm Reset Tool</h2>

      <label for="stress">Stress Level</label>
      <input type="range" id="stress" min="1" max="10" value="5">

      <label for="feeling">How do you feel?</label>
      <select id="feeling">
        <option>Anxious</option>
        <option>Overwhelmed</option>
        <option>Tired</option>
        <option>Irritable</option>
        <option>Foggy</option>
      </select>

      <label for="time">Time Available</label>
      <select id="time">
        <option value="1">1 minute</option>
        <option value="5">5 minutes</option>
        <option value="15">15 minutes</option>
      </select>

      <label for="place">Where are you?</label>
      <select id="place">
        <option>At home</option>
        <option>At work</option>
        <option>On the go</option>
      </select>

      <button onclick="generateCalm()">Get My Calm Plan</button>

      <div id="result" class="result"></div>

      <div id="emailSection" style="display:none;">
        <input type="email" id="userEmail" placeholder="Enter your email to receive your plan 💚">
        <button onclick="sendEmail()">Send My Plan</button>
      </div>
    </div>
  </div>

  <div class="seo-text">
    <h2>A Calm Reset — Anytime</h2>
    <p>This simple tool helps you pause and reset when life feels overwhelming. Choose how you feel, how much time you have, and where you are — and get a gentle plan you can follow right away.</p>
  </div>

<script>
function generateCalm() {
  let feeling = document.getElementById("feeling").value;
  let time = document.getElementById("time").value;
  let place = document.getElementById("place").value;

  let plan = "";
  let mantra = "";

  if (feeling === "Anxious") {
    plan = "• Press your feet into the floor\n• Massage behind your ears for 20 seconds\n• Breathe in for 4, out for 6 — five times\n• Name 3 things you see";
    mantra = "I am safe right now.";
  } else if (feeling === "Overwhelmed") {
    plan = "• Take 3 slow breaths\n• Relax your shoulders\n• Choose one small next step\n• Pause before continuing";
    mantra = "One step at a time.";
  } else if (feeling === "Tired") {
    plan = "• Stretch your arms overhead\n• Take a deep breath\n• Sip water or tea\n• Sit upright near light";
    mantra = "I can restore gently.";
  } else if (feeling === "Irritable") {
    plan = "• Pause before reacting\n• Take a slow breath\n• Step away briefly if you can\n• Release your jaw and shoulders";
    mantra = "I choose calm.";
  } else {
    plan = "• Sit up tall\n• Take 5 slow breaths\n• Stretch gently\n• Focus on one small action";
    mantra = "Clarity will come.";
  }

  let products = `
    <div class="product-card">
      <h3>Recommended for you</h3>
      <p>🌸 <a href="https://amzn.to/3QxpJmh" target="_blank">Aromatherapy Diffuser Necklace</a></p>
      <p>💧 <a href="https://amzn.to/4vG0Kxj" target="_blank">Lavender Spray</a></p>
      <p>💛 <a href="https://amzn.to/4e2CkI9" target="_blank">Touch Bracelets</a></p>
    </div>
  `;

  let book = `
    <div class="book-card">
      <h3>Want to go deeper?</h3>
      <p>This gentle guide helps you reconnect with calm, movement, and emotional ease.</p>
      <a href="https://calmtools7.gumroad.com/l/calm-dance-guide" target="_blank"
      style="display:inline-block; margin-top:10px; background:#6e9385; color:white; padding:10px 14px; border-radius:8px; text-decoration:none; font-weight:bold;">
      Explore the Calm Dance Guide
      </a>
    </div>
  `;

  document.getElementById("result").innerHTML =
    "<h2>Your Calm Reset Plan</h2>" +
    "<p><strong>For " + time + " minute(s), " + place.toLowerCase() + ":</strong></p>" +
    "<div style='white-space:pre-wrap; line-height:1.6;'>" + plan + "</div>" +
    "<p><strong>" + mantra + "</strong></p>" +
    products +
    book;

  document.getElementById("emailSection").style.display = "block";
}

function sendEmail() {
  const email = document.getElementById("userEmail").value.trim();
  const resultText = document.getElementById("result").innerText;

  if (!email) {
    alert("Please enter your email address.");
    return;
  }

  if (!resultText) {
    alert("Please generate your calm plan first.");
    return;
  }

  alert("Thank you! Your email was entered successfully. The email sending connection still needs EmailJS added.");
}
</script>
