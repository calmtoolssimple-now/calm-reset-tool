<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calm Reset Tool</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f8f4ef 0%, #eef6f3 100%);
      color: #3e4a42;
      min-height: 100vh;
      padding: 24px 16px 40px;
    }

    .container {
      max-width: 940px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 26px;
      padding: 24px;
      box-shadow: 0 10px 28px rgba(70, 90, 80, 0.10);
      border: 1px solid rgba(120, 150, 140, 0.12);
    }

    .header-image {
      width: 100%;
      max-width: 740px;
      display: block;
      margin: 0 auto 14px;
      border-radius: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 8px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: bold;
      margin-bottom: 8px;
      color: #42584f;
      font-size: 1.05rem;
    }

    select,
    input[type="range"] {
      width: 100%;
    }

    select {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #d7e3dd;
      background: #fff;
      font-size: 1rem;
      color: #33433d;
    }

    .slider-wrap {
      background: #f6faf8;
      border: 1px solid #d7e3dd;
      border-radius: 16px;
      padding: 16px;
    }

    .slider-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 10px;
      color: #5b6d64;
      font-size: 0.96rem;
    }

    .stress-value {
      font-weight: bold;
      font-size: 1.05rem;
      color: #2f4d43;
      background: #e4f0eb;
      padding: 6px 12px;
      border-radius: 999px;
      min-width: 40px;
      text-align: center;
    }

    input[type="range"] {
      accent-color: #7ba696;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 1.08rem;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(135deg, #89b3a3, #6e9385);
      color: white;
      margin-top: 8px;
      box-shadow: 0 8px 20px rgba(110, 147, 133, 0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(110, 147, 133, 0.30);
    }

    .result {
      margin-top: 28px;
      padding: 24px;
      border-radius: 20px;
      background: linear-gradient(180deg, #f9fcfb 0%, #f3f8f6 100%);
      border: 1px solid #dbe9e3;
      display: none;
      text-align: left;
    }

    .result h2 {
      margin-top: 0;
      color: #2f4d43;
      font-size: 1.7rem;
      margin-bottom: 10px;
    }

    .intro-line {
      font-size: 1rem;
      color: #5d6e66;
      margin-bottom: 18px;
      font-style: italic;
    }

    .result-item {
      margin-bottom: 14px;
      line-height: 1.55;
      color: #42584f;
      font-size: 1rem;
    }

    .mantra-box,
    .bonus-box {
      margin-top: 16px;
      padding: 16px;
      background: #fff;
      border-radius: 16px;
      border: 1px dashed #c8d9d1;
      color: #5d6e66;
    }

    .recommend-title {
      margin: 24px 0 14px;
      color: #42584f;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .recommend-sub {
      margin-top: -2px;
      margin-bottom: 14px;
      color: #6a7b73;
      font-size: 0.95rem;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 14px;
    }

    .product-card {
      background: rgba(255,255,255,0.96);
      border-radius: 18px;
      border: 1px solid rgba(120, 150, 140, 0.14);
      box-shadow: 0 8px 20px rgba(70, 90, 80, 0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 230px;
    }

    .product-image {
      height: 118px;
      background: linear-gradient(180deg, #edf4f1, #f8fbfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: #6e9385;
      border-bottom: 1px solid #e5efea;
    }

    .product-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .product-title {
      font-weight: bold;
      color: #42584f;
      line-height: 1.35;
      font-size: 1rem;
    }

    .product-copy {
      color: #60716a;
      line-height: 1.45;
      font-size: 0.92rem;
      flex: 1;
    }

    .product-link {
      display: inline-block;
      color: #6e9385;
      text-decoration: none;
      font-weight: bold;
      margin-top: 2px;
    }

    .product-link:hover {
      text-decoration: underline;
    }

    .footer-note {
      margin-top: 18px;
      text-align: center;
      font-size: 0.94rem;
      color: #74837c;
    }

    @media (max-width: 760px) {
      .form-grid,
      .product-grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <img src="calmheader.png" alt="Calm & Simple Calm Reset Tool header" class="header-image" />

      <div class="form-grid">
        <div class="field full">
          <label for="stress">Stress Level</label>
          <div class="slider-wrap">
            <div class="slider-top">
              <span>How stressed do you feel right now?</span>
              <span class="stress-value" id="stressValue">5</span>
            </div>
            <input type="range" id="stress" min="1" max="10" value="5" oninput="updateStressValue()" />
          </div>
        </div>

        <div class="field">
          <label for="feeling">How do you feel?</label>
          <select id="feeling">
            <option>Anxious</option>
            <option>Overwhelmed</option>
            <option>Tired</option>
            <option>Irritable</option>
            <option>Foggy</option>
          </select>
        </div>

        <div class="field">
          <label for="time">Time Available</label>
          <select id="time">
            <option value="1">1 minute</option>
            <option value="5">5 minutes</option>
            <option value="15">15 minutes</option>
          </select>
        </div>

        <div class="field full">
          <label for="place">Where are you?</label>
          <select id="place">
            <option>At home</option>
            <option>At work</option>
            <option>On the go</option>
          </select>
        </div>

        <div class="field full">
          <button onclick="generateCalm()">Get My Calm Plan</button>
        </div>
      </div>

      <div class="result" id="result"></div>
      <div class="footer-note">Small steps. Softer moments. A calmer you.</div>
    </div>
  </div>

  <script>
    function updateStressValue() {
      document.getElementById("stressValue").textContent =
        document.getElementById("stress").value;
    }

    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function getPlan(stress, feeling, time, place) {
      let intro = "";
      let breathe = "";
      let move = "";
      let food = "";
      let environment = "";
      let bonus = "";

      if (feeling === "Anxious") {
        intro = pickRandom([
          "You're feeling anxious — let's gently slow things down.",
          "Your system feels activated — let's bring things down a notch.",
          "You need a softer moment right now — let's start there."
        ]);

        breathe = stress >= 7
          ? "🫁 <strong>Breathe:</strong> Try box breathing. Inhale for 4, hold for 4, exhale for 4, hold for 4."
          : "🫁 <strong>Breathe:</strong> Inhale for 4 and exhale for 6, slowly and gently.";

        move = time === "1"
          ? "🧘 <strong>Move:</strong> Place your fingers on the area just behind your ears and gently massage in slow circles for 15–25 seconds."
          : "🧘 <strong>Move:</strong> Place your fingers just behind your ears and gently massage in circles for 20 seconds, then relax your shoulders and soften your jaw.";

        food = "🍵 <strong>Sip:</strong> Cool water, mint tea, or a few slow sips of something calming.";
        environment = place === "At work"
          ? "🌸 <strong>Settle:</strong> Keep it discreet. Lower stimulation and pause for a quiet breath at your desk."
          : "🌸 <strong>Settle:</strong> Lower noise, dim the lights if possible, and create a softer space around you.";

        bonus = "A calming scent like lavender can help signal safety to your nervous system.";
      }

      else if (feeling === "Overwhelmed") {
        intro = pickRandom([
          "You're carrying a lot right now — let's simplify things.",
          "Too much is pulling at you — let's shrink this moment down.",
          "Overwhelm is here — but you only need the next small step."
        ]);

        breathe = stress >= 7
          ? "🫁 <strong>Breathe:</strong> Inhale for 4 and exhale for 6 for one full minute."
          : "🫁 <strong>Breathe:</strong> Take 3 slower breaths than usual and let the exhale be longer.";

        move = time === "15"
          ? "🧘 <strong>Move:</strong> Roll your shoulders back slowly 5 times, stretch your arms, and take a short walk if you can."
          : "🧘 <strong>Move:</strong> Roll your shoulders back slowly and unclench your hands.";

        food = "🍵 <strong>Sip:</strong> Warm herbal tea, mint, or a few slow sips of water.";
        environment = place === "At work"
          ? "🌸 <strong>Simplify:</strong> Pick one task only. Ignore the rest for the next few minutes."
          : "🌸 <strong>Simplify:</strong> Clear one small space around you and focus only on the next step.";

        bonus = "You do not need to solve everything right now.";
      }

      else if (feeling === "Tired") {
        intro = pickRandom([
          "Your energy is low — let's gently restore it.",
          "You need a softer reset, not pressure.",
          "Let's wake your system up gently, not forcefully."
        ]);

        breathe = "🫁 <strong>Breathe:</strong> Take 3 deep breaths with a long, slow exhale.";
        move = time === "1"
          ? "🧘 <strong>Move:</strong> Reach your arms overhead and lengthen your spine."
          : "🧘 <strong>Move:</strong> Reach your arms overhead, stretch your neck gently, and open your chest.";

        food = "🍵 <strong>Sip:</strong> Green tea, peppermint tea, lemon water, or something cool and fresh like cucumber.";
        environment = place === "At work"
          ? "🌸 <strong>Refresh:</strong> Sit up tall, get a little light if possible, and take a short screen break."
          : "🌸 <strong>Refresh:</strong> Sit near a window or step outside for fresh air if you can.";

        bonus = "A short break now may help you think more clearly later.";
      }

      else if (feeling === "Irritable") {
        intro = pickRandom([
          "You're feeling on edge — let's cool things down.",
          "That sharp edge can soften — start small.",
          "Irritation is here. Let's give it less fuel."
        ]);

        breathe = "🫁 <strong>Breathe:</strong> Inhale deeply through your nose and exhale slowly through your mouth.";
        move = time === "15"
          ? "🧘 <strong>Move:</strong> Walk slowly for a few minutes or do a forward fold if comfortable."
          : "🧘 <strong>Move:</strong> Loosen your shoulders and take a short walk if you can.";

        food = "🍵 <strong>Sip:</strong> Cold water, mint tea, or a light snack if you have not eaten.";
        environment = place === "At work"
          ? "🌸 <strong>Cool down:</strong> Step away briefly, lower stimulation, and pause before replying to anything."
          : "🌸 <strong>Cool down:</strong> Step away from noise and reduce stimulation for a few moments.";

        bonus = "A calm playlist or softer lighting can take the edge off.";
      }

      else {
        intro = pickRandom([
          "Your mind feels cloudy — let's clear some space.",
          "Foggy is okay — let's create a little clarity.",
          "You don't need perfect focus. Just a small reset."
        ]);

        breathe = "🫁 <strong>Breathe:</strong> Take 5 steady breaths, slightly longer on the exhale.";
        move = time === "1"
          ? "🧘 <strong>Move:</strong> Sit or stand tall and gently roll your neck."
          : "🧘 <strong>Move:</strong> Stretch your arms, rotate your neck gently, and sit or stand tall.";

        food = "🍵 <strong>Sip:</strong> Green tea, lemon water, mint, or something cool and fresh like cucumber.";
        environment = place === "At work"
          ? "🌸 <strong>Brighten:</strong> Reduce clutter in front of you and focus on one simple next action."
          : "🌸 <strong>Brighten:</strong> Open blinds, add light, and reduce visual clutter in your space.";

        bonus = "Small completed actions can help mental fog begin to lift.";
      }

      if (time === "15") {
        bonus += " Since you have more time, add a gentle yoga stretch, a quiet walk, or a longer pause away from stimulation.";
      }

      if (stress >= 8) {
        environment = "🌸 <strong>Settle:</strong> Pause everything you can for a moment and focus only on breath, posture, and safety.";
      }

      return { intro, breathe, move, food, environment, bonus };
    }

    function getMantra(feeling) {
      let options = [];

      if (feeling === "Anxious") {
        options = [
          "This moment will pass. I am safe right now.",
          "I can breathe through this.",
          "Calm is returning to me."
        ];
      } else if (feeling === "Overwhelmed") {
        options = [
          "One step at a time is enough.",
          "I can slow this down.",
          "I do not need to do everything right now."
        ];
      } else if (feeling === "Tired") {
        options = [
          "I can move gently and restore my energy.",
          "Rest is productive too.",
          "I give myself permission to slow down."
        ];
      } else if (feeling === "Irritable") {
        options = [
          "I can pause before I react.",
          "This feeling will pass.",
          "I choose calm over reaction."
        ];
      } else {
        options = [
          "Clarity comes with small steps.",
          "I can reset my focus.",
          "One small action creates momentum."
        ];
      }

      return pickRandom(options);
    }

    function productCard(icon, title, copy, link) {
      return `
        <div class="product-card">
          <div class="product-image">${icon}</div>
          <div class="product-body">
            <div class="product-title">${title}</div>
            <div class="product-copy">${copy}</div>
            <a class="product-link" href="${link}" target="_blank" rel="noopener noreferrer">View recommendation</a>
          </div>
        </div>
      `;
    }

    function buildRecommendations(stress, place) {
      let cards = "";

      if (stress >= 7 || place === "At work") {
        cards += productCard(
          "🌸",
          "Aromatherapy Lava Stone Diffuser Necklace",
          "A wearable diffuser that gives you a steady calming scent through the day — especially helpful at work or during high stress.",
          "https://amzn.to/3QxpJmh"
        );

        cards += productCard(
          "💧",
          "Lavender Room & Pillow Spray",
          "A quick reset for your space or pillow when you need a soothing, calming environment fast.",
          "https://amzn.to/4vG0Kxj"
        );
      } else if (stress >= 4) {
        cards += productCard(
          "💛",
          "Long Distance Touch Bracelets",
          "A gentle emotional connection — a comforting reminder that you’re supported, even from afar.",
          "https://amzn.to/4e2CkI9"
        );

        cards += productCard(
          "💧",
          "Lavender Room & Pillow Spray",
          "Perfect for creating a calmer mood at home, before rest, or during a stressful day.",
          "https://amzn.to/4vG0Kxj"
        );
      } else {
        cards += productCard(
          "💛",
          "Long Distance Touch Bracelets",
          "A grounding reminder of connection, comfort, and calm.",
          "https://amzn.to/4e2CkI9"
        );

        cards += productCard(
          "🌸",
          "Aromatherapy Lava Stone Diffuser Necklace",
          "A calming wearable choice for gentle daily support.",
          "https://amzn.to/3QxpJmh"
        );
      }

      return `
        <div class="recommend-title">🌿 Recommended for how you're feeling</div>
        <div class="recommend-sub">These suggestions are based on your stress level and where you are right now.</div>
        <div class="product-grid">${cards}</div>
      `;
    }

    function generateCalm() {
      const stress = parseInt(document.getElementById("stress").value);
      const feeling = document.getElementById("feeling").value;
      const time = document.getElementById("time").value;
      const place = document.getElementById("place").value;
      const result = document.getElementById("result");

      const plan = getPlan(stress, feeling, time, place);
      const mantra = getMantra(feeling);
      const recommendations = buildRecommendations(stress, place);

      result.innerHTML = `
        <h2>🌿 Your Calm Reset Plan</h2>
        <div class="intro-line">${plan.intro}</div>
        <div class="result-item">${plan.breathe}</div>
        <div class="result-item">${plan.move}</div>
        <div class="result-item">${plan.food}</div>
        <div class="result-item">${plan.environment}</div>

        <div class="mantra-box">
          <strong>Calming mantra</strong><br>
          <em>${mantra}</em>
        </div>

        <div class="bonus-box">
          <strong>Gentle note</strong><br>
          ${plan.bonus}
        </div>

        ${recommendations}
      `;

      result.style.display = "block";
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    updateStressValue();
  </script>
</body>
</html>
