<script>

function generateCalm(){

let plan = "";
let mantra = "";

if(feeling==="Anxious"){
plan = "• Press your feet into the floor\n• Massage behind your ears for 20 seconds\n• Breathe in for 4, out for 6 (5 times)\n• Name 3 things you see";
mantra = "I am safe right now.";
}
else if(feeling==="Overwhelmed"){
plan = "• Take 3 slow breaths\n• Relax your shoulders\n• Focus on ONE task only\n• Pause before continuing";
mantra = "One step at a time.";
}
else if(feeling==="Tired"){
plan = "• Stretch your arms overhead\n• Take a deep breath\n• Sip water or tea\n• Sit upright near light";
mantra = "I can restore gently.";
}
else if(feeling==="Irritable"){
plan = "• Pause before reacting\n• Take a slow breath\n• Step away briefly\n• Release shoulder tension";
mantra = "I choose calm.";
}
else{
plan = "• Sit up tall\n• Take 5 slow breaths\n• Stretch gently\n• Focus on one small action";
mantra = "Clarity will come.";
}

let products = `
<h3>🌿 Recommended for you</h3>
