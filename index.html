<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm Reset Tool</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #f8f4ef, #eef6f3);
  color: #3e4a42;
  text-align: center;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

/* HEADER IMAGE */
.header-img {
  width: 100%;
  max-width: 420px;
  margin: 20px auto;
  display: block;
}

/* CARD */
.card {
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* INPUTS */
select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  background: #6e9385;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* RESULT */
.result {
  margin-top: 20px;
  padding: 20px;
  background: #f4f9f7;
  border-radius: 15px;
  display: none;
}

/* AMAZON SECTION */
.products {
  margin-top: 30px;
}

.product-card {
  background: white;
  border-radius: 15px;
  padding: 15px;
  margin: 10px 0;
  box-shadow: 0 5px 15px rgba(0,0,0,0.06);
}

.product-card a {
  color: #6e9385;
  font-weight: bold;
  text-decoration: none;
}

.product-card a:hover {
  text-decoration: underline;
}

.footer {
  margin-top: 20px;
  font-size: 0.9rem;
  color: #777;
}
</style>
</head>

<body>

<div class="container">

<!-- 🌿 HEADER IMAGE -->
<img src="YOUR_IMAGE_URL_HERE" class="header-img">

<div class="card">

<h2>Calm Reset Tool</h2>
<p>A gentle personalized reset for stressful moments.</p>

<label>How do you feel?</label>
<select id="feeling">
  <option>Anxious</option>
  <option>Overwhelmed</option>
  <option>Tired</option>
</select>

<label>Time Available</label>
<select id="time">
  <option value="1">1 minute</option>
  <option value="5">5 minutes</option>
</select>

<button onclick="generateCalm()">Get My Calm Plan</button>

<div id="result" class="result"></div>

</div>

<!-- 🌿 AMAZON PRODUCTS -->
<div class="products">

<h3>🌿 Gentle Support Tools</h3>

<div class="product-card">
  🐵 <a href="https://amzn.to/4sGk0YG" target="_blank">The Zen Monkey & Lotus Flower</a>
</div>

<div class="product-card">
  🌸 <a href="https://amzn.to/4sGk0YG" target="_blank">Aromatherapy Locket Diffuser</a>
</div>

<div class="product-card">
  🌿 <a href="https://amzn.to/4t1n0zn" target="_blank">Calming Lemon Balm Spray</a>
</div>

<div class="product-card">
  💍 <a href="https://amzn.to/4e1r9iV" target="_blank">Fidget Rings</a>
</div>

<div class="product-card">
  💛 <a href="https://amzn.to/4cxCapH" target="_blank">Encouragement Necklace</a>
</div>

<div class="product-card">
  🧘 <a href="https://amzn.to/41H7EEU" target="_blank">Anti-Anxiety Ring</a>
</div>

</div>

<div class="footer">
Small steps. Softer moments. A calmer you.
</div>

</div>

<script>
function generateCalm() {

  let feeling = document.getElementById("feeling").value;
  let result = document.getElementById("result");

  let message = "";

  if (feeling === "Anxious") {
    message = "You're feeling anxious — take 5 slow breaths. Relax your shoulders and sip water.";
  } 
  else if (feeling === "Overwhelmed") {
    message = "You're carrying a lot — focus on ONE small task and take a deep breath.";
  } 
  else {
    message = "Your energy is low — stretch your body and drink something refreshing.";
  }

  result.innerHTML = message;
  result.style.display = "block";
}
</script>

</body>
</html>
