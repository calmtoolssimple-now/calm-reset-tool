<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm Reset Tool</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #f8f4ef, #eef6f3);
  color: #3e4a42;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.header-image {
  width: 100%;
  max-width: 600px;
  display: block;
  margin: 0 auto 15px;
  border-radius: 15px;
}

select, button, input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  background: #6e9385;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  padding: 20px;
  background: #f4f9f7;
  border-radius: 15px;
  display: none;
}

.product-card {
  background: white;
  border-radius: 15px;
  padding: 15px;
  margin-top: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.06);
}

.product-card a {
  color: #6e9385;
  font-weight: bold;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<img src="calmheader.png" class="header-image">

<h2>Calm Reset Tool</h2>

<label>Stress Level</label>
<input type="range" id="stress" min="1" max="10" value="5">

<label>How do you feel?</label>
<select id="feeling">
<option>Anxious</option>
<option>Overwhelmed</option>
<option>Tired</option>
<option>Irritable</option>
<option>Foggy</option>
</select>

<label>Time Available</label>
<select id="time">
<option value="1">1 minute</option>
<option value="5">5 minutes</option>
<option value="15">15 minutes</option>
</select>

<label>Where are you?</label>
<select id="place">
<option>At home</option>
<option>At work</option>
<option>On the go</option>
</select>

<button onclick="generateCalm()">Get My Calm Plan</button>

<div id="result" class="result"></div>

<!-- EMAIL SECTION -->
<div id="emailSection" style="display:none;">
<input type="email" id="userEmail" placeholder="Enter your email to receive your plan 💚">
<button onclick="sendEmail()">Send My Plan</button>
<p style="font-size:12px;color:#777;">We’ll only send your calm plan. No spam.</p>
</div>

</div>
</div>

<script>

(function(){
emailjs.init("8-6yk8giaQBxBAjNz");
})();

let currentPlan = "";
let currentMantra = "";

function randomItem(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generateCalm(){

let stress = parseInt(document.getElementById("stress").value);
let feeling = document.getElementById("feeling").value;
let time = document.getElementById("time").value;
let place = document.getElementById("place").value;

let plan = "";
let mantraOptions = [];

if(feeling==="Anxious"){
plan = `
Step 1: Press your feet firmly into the ground.

Step 2: Massage behind your ears in slow circles for 20 seconds.

Step 3: Breathe in for 4, out for 6 (repeat 5 times).

Step 4: Name 3 things you see and 2 things you feel.
`;
mantraOptions = ["I am safe right now.","This will pass.","I can breathe through this."];
}

else if(feeling==="Overwhelmed"){
plan = `
Step 1: Stop and take 3 slow breaths.

Step 2: Relax your shoulders and unclench your hands.

Step 3: Focus on just ONE small task.

Step 4: Take a short pause before continuing.
`;
mantraOptions = ["One step at a time.","I can slow this down.","I don’t need to do everything."];
}

else if(feeling==="Tired"){
plan = `
Step 1: Stretch your arms overhead.

Step 2: Take a deep breath and open your chest.

Step 3: Sip water or tea.

Step 4: Sit upright and take in natural light.
`;
mantraOptions = ["I can restore gently.","Rest is okay.","I will move slowly."];
}

else if(feeling==="Irritable"){
plan = `
Step 1: Pause before reacting.

Step 2: Take a slow breath in and out.

Step 3: Step away for a moment if possible.

Step 4: Release tension from your shoulders.
`;
mantraOptions = ["I can pause.","I choose calm.","This feeling will pass."];
}

else{
plan = `
Step 1: Sit up tall.

Step 2: Take 5 slow breaths.

Step 3: Stretch your body gently.

Step 4: Focus on one small action.
`;
mantraOptions = ["Clarity will come.","One step helps.","I can reset."];
}

let mantra = randomItem(mantraOptions);

currentPlan = plan;
currentMantra = mantra;

// PRODUCTS
let products = "<h3>🌿 Recommended for how you're feeling</h3>";

if(stress>=7 || place==="At work"){
products += `
<div class="product-card">🌸 <a href="https://amzn.to/3QxpJmh" target="_blank">Aromatherapy Diffuser Necklace</a></div>
<div class="product-card">💧 <a href="https://amzn.to/4vG0Kxj" target="_blank">Lavender Spray</a></div>
`;
}
else{
products += `
<div class="product-card">💛 <a href="https://amzn.to/4e2CkI9" target="_blank">Touch Bracelets</a></div>
<div class="product-card">💧 <a href="https://amzn.to/4vG0Kxj" target="_blank">Lavender Spray</a></div>
`;
}

document.getElementById("result").innerHTML =
"<h2>Your Calm Reset Plan</h2><pre>"+plan+"</pre><p><strong>"+mantra+"</strong></p>"+products;

document.getElementById("result").style.display="block";
document.getElementById("emailSection").style.display="block";

}

function sendEmail(){

let email = document.getElementById("userEmail").value;

emailjs.send("service_hfr86fp","template_80hmaqd",{
to_name:"Friend",
to_email:email,
plan:currentPlan,
mantra:currentMantra
}).then(function(){
alert("Your calm plan has been sent 💚");
});

}

</script>

</body>
</html>
