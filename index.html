<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calm Reset Tool</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #f8f4ef, #eef6f3);
  color: #3e4a42;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.header-image {
  width: 100%;
  max-width: 600px;
  display: block;
  margin: 0 auto 15px;
  border-radius: 15px;
}

select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  background: #6e9385;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  padding: 20px;
  background: #f4f9f7;
  border-radius: 15px;
  display: none;
}

.book-card {
  border: 2px solid #89b3a3;
  border-radius: 15px;
  padding: 15px;
  margin-top: 20px;
  background: white;
}

.book-link {
  display: inline-block;
  background: #6e9385;
  color: white;
  padding: 12px 16px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  margin-top: 10px;
}

.product-card {
  background: white;
  border-radius: 15px;
  padding: 15px;
  margin-top: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.06);
}

.product-card a {
  color: #6e9385;
  font-weight: bold;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<img src="calmheader.png" class="header-image">

<h2>Calm Reset Tool</h2>

<label>Stress Level</label>
<input type="range" id="stress" min="1" max="10" value="5">

<label>How do you feel?</label>
<select id="feeling">
<option>Anxious</option>
<option>Overwhelmed</option>
<option>Tired</option>
<option>Irritable</option>
<option>Foggy</option>
</select>

<label>Time Available</label>
<select id="time">
<option value="1">1 minute</option>
<option value="5">5 minutes</option>
<option value="15">15 minutes</option>
</select>

<label>Where are you?</label>
<select id="place">
<option>At home</option>
<option>At work</option>
<option>On the go</option>
</select>

<button onclick="generateCalm()">Get My Calm Plan</button>

<div id="result" class="result"></div>

</div>
</div>

<script>

const BOOK_LINK = "https://calmtools7.gumroad.com/l/calm-dance-guide";

function randomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generateCalm() {

let stress = parseInt(document.getElementById("stress").value);
let feeling = document.getElementById("feeling").value;
let time = document.getElementById("time").value;
let place = document.getElementById("place").value;

let mantraOptions = {
  Anxious: ["I am safe right now.", "This will pass.", "I can breathe through this."],
  Overwhelmed: ["One step at a time.", "I don’t need to do everything.", "I can slow this down."],
  Tired: ["I can restore gently.", "Rest is okay.", "I will move slowly."],
  Irritable: ["I can pause.", "I choose calm.", "This feeling will pass."],
  Foggy: ["Clarity comes slowly.", "One step helps.", "I can reset."]
};

let mantra = randomItem(mantraOptions[feeling]);

let plan = `
<h2>🌿 Your Calm Reset Plan</h2>
<p>Take a moment to slow things down.</p>
<p>🫁 Breathe slowly for 30 seconds.</p>
<p>🧘 Relax your shoulders.</p>
<p>🍵 Sip water or tea.</p>

<div style="margin-top:10px; font-style:italic;">
${mantra}
</div>
`;


// ⭐ FEATURED BOOK (ALWAYS FIRST)
let book = `
<div class="book-card">
<h3>📘 Take your calm deeper</h3>
<p>This gentle guide helps you reconnect with calm, movement, and emotional ease.</p>
<a class="book-link" href="${BOOK_LINK}" target="_blank">
Get the Calm Dance Guide
</a>
</div>
`;


// 🛍 PRODUCTS
let products = "";

if (stress >= 7 || place === "At work") {
  products += `
  <div class="product-card">
    🌸 <a href="https://amzn.to/4sGk0YG" target="_blank">Aromatherapy Locket</a>
  </div>
  <div class="product-card">
    💍 <a href="https://amzn.to/4e1r9iV" target="_blank">Fidget Rings</a>
  </div>
  `;
}
else {
  products += `
  <div class="product-card">
    🌿 <a href="https://amzn.to/4t1n0zn" target="_blank">Calming Spray</a>
  </div>
  <div class="product-card">
    💛 <a href="https://amzn.to/4cxCapH" target="_blank">Encouragement Necklace</a>
  </div>
  `;
}

document.getElementById("result").innerHTML = plan + book + products;
document.getElementById("result").style.display = "block";

}
</script>

</body>
</html>
