<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calm Reset Tool</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f8f4ef 0%, #eef6f3 100%);
      color: #3e4a42;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.94);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 12px 30px rgba(70, 90, 80, 0.12);
      border: 1px solid rgba(120, 150, 140, 0.12);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 2.4rem;
      line-height: 1.1;
      color: #2f4d43;
      text-align: center;
    }

    .subtext {
      text-align: center;
      font-size: 1.05rem;
      color: #66756d;
      margin-bottom: 30px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: bold;
      margin-bottom: 8px;
      color: #42584f;
    }

    select,
    input[type="range"] {
      width: 100%;
    }

    select {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid #cddbd4;
      background: #fff;
      font-size: 1rem;
      color: #33433d;
    }

    .slider-wrap {
      background: #f6faf8;
      border: 1px solid #d7e5de;
      border-radius: 16px;
      padding: 16px;
    }

    .slider-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 0.95rem;
      color: #5b6d64;
    }

    .stress-value {
      font-weight: bold;
      font-size: 1.1rem;
      color: #2f4d43;
      background: #e4f0eb;
      padding: 4px 10px;
      border-radius: 999px;
    }

    input[type="range"] {
      accent-color: #7ba696;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 15px 18px;
      font-size: 1.05rem;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(135deg, #89b3a3, #6e9385);
      color: white;
      margin-top: 10px;
      box-shadow: 0 8px 20px rgba(110, 147, 133, 0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(110, 147, 133, 0.3);
    }

    .result {
      margin-top: 28px;
      padding: 24px;
      border-radius: 20px;
      background: linear-gradient(180deg, #f9fcfb 0%, #f3f8f6 100%);
      border: 1px solid #dbe9e3;
      display: none;
    }

    .result h2 {
      margin-top: 0;
      color: #2f4d43;
      font-size: 1.7rem;
      margin-bottom: 10px;
    }

    .intro-line {
      font-size: 1rem;
      color: #5d6e66;
      margin-bottom: 18px;
      font-style: italic;
    }

    .result-item {
      margin-bottom: 14px;
      line-height: 1.5;
      color: #42584f;
      font-size: 1rem;
    }

    .soft-box {
      margin-top: 18px;
      padding: 16px;
      background: #fff;
      border-radius: 16px;
      border: 1px dashed #c8d9d1;
      color: #5d6e66;
    }

    .soft-box ul {
      margin: 10px 0 0 18px;
      padding: 0;
    }

    .soft-box li {
      margin-bottom: 10px;
    }

    .soft-box a,
    .support-card a {
      color: #5c8475;
      text-decoration: none;
      font-weight: bold;
    }

    .soft-box a:hover,
    .support-card a:hover {
      text-decoration: underline;
    }

    .support-selector {
      margin-top: 20px;
    }

    .support-card {
      margin-top: 14px;
      padding: 18px;
      background: #ffffff;
      border-radius: 18px;
      border: 1px solid #dbe9e3;
      box-shadow: 0 6px 18px rgba(70, 90, 80, 0.06);
    }

    .support-card h3 {
      margin-top: 0;
      margin-bottom: 10px;
      color: #2f4d43;
      font-size: 1.1rem;
    }

    .support-card p {
      margin: 8px 0;
      line-height: 1.5;
      color: #56675f;
    }

    .footer-note {
      margin-top: 14px;
      text-align: center;
      font-size: 0.92rem;
      color: #74837c;
    }

    @media (max-width: 700px) {
      .card { padding: 22px; }
      .form-grid { grid-template-columns: 1fr; }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Calm Reset Tool</h1>
      <p class="subtext">Feeling overwhelmed? Take 60 seconds to reset your mind and body.</p>

      <div class="form-grid">
        <div class="field full">
          <label for="stress">Stress Level</label>
          <div class="slider-wrap">
            <div class="slider-top">
              <span>How stressed do you feel right now?</span>
              <span class="stress-value" id="stressValue">5</span>
            </div>
            <input type="range" id="stress" min="1" max="10" value="5" oninput="updateStressValue()" />
          </div>
        </div>

        <div class="field">
          <label for="feeling">How do you feel?</label>
          <select id="feeling">
            <option>Anxious</option>
            <option>Overwhelmed</option>
            <option>Tired</option>
            <option>Irritable</option>
            <option>Foggy</option>
          </select>
        </div>

        <div class="field">
          <label for="time">Time Available</label>
          <select id="time">
            <option value="1">1 minute</option>
            <option value="5">5 minutes</option>
            <option value="15">15 minutes</option>
          </select>
        </div>

        <div class="field full">
          <label for="place">Where are you?</label>
          <select id="place">
            <option>At home</option>
            <option>At work</option>
            <option>On the go</option>
          </select>
        </div>

        <div class="field full">
          <button onclick="generateCalm()">Get My Calm Plan</button>
        </div>
      </div>

      <div class="result" id="result"></div>
      <div class="footer-note">Small steps. Softer moments. A calmer you.</div>
    </div>
  </div>

  <script>
    const AMAZON_LINKS = {
      zenMonkey: "https://amzn.to/4sGk0YG",
      locket: "https://amzn.to/4sGk0YG",
      canIFresh: "https://amzn.to/4t1n0zn",
      fidgetRings: "https://amzn.to/4e1r9iV",
      necklace: "https://amzn.to/4cxCapH",
      anxietyRing: "https://amzn.to/41H7EEU"
    };

    const BOOK_TITLE = "Dance as a Pathway to Freedom";
    const BOOK_LINK = "#";

    function updateStressValue() {
      document.getElementById("stressValue").textContent =
        document.getElementById("stress").value;
    }

    function buildProducts(feeling) {
      if (feeling === "Anxious") {
        return `
          <div class="soft-box">
            <strong>🌿 Optional Comfort Boosts</strong>
            <ul>
              <li>🌸 <a href="${AMAZON_LINKS.locket}" target="_blank" rel="noopener noreferrer">Lava Stone Aromatherapy Locket Diffuser</a></li>
              <li>💍 <a href="${AMAZON_LINKS.fidgetRings}" target="_blank" rel="noopener noreferrer">Fidget Rings</a></li>
              <li>🧘 <a href="${AMAZON_LINKS.anxietyRing}" target="_blank" rel="noopener noreferrer">Anti-Anxiety Ring</a></li>
            </ul>
          </div>
        `;
      }

      if (feeling === "Overwhelmed") {
        return `
          <div class="soft-box">
            <strong>🌿 Optional Comfort Boosts</strong>
            <ul>
              <li>🐵 <a href="${AMAZON_LINKS.zenMonkey}" target="_blank" rel="noopener noreferrer">The Zen Monkey and The Lotus Flower</a></li>
              <li>🌿 <a href="${AMAZON_LINKS.canIFresh}" target="_blank" rel="noopener noreferrer">Can-i Fresh Lemon Balm Spray</a></li>
              <li>💛 <a href="${AMAZON_LINKS.necklace}" target="_blank" rel="noopener noreferrer">Encouragement Necklace</a></li>
            </ul>
          </div>
        `;
      }

      if (feeling === "Tired") {
        return `
          <div class="soft-box">
            <strong>🌿 Optional Comfort Boosts</strong>
            <ul>
              <li>🌿 <a href="${AMAZON_LINKS.canIFresh}" target="_blank" rel="noopener noreferrer">Can-i Fresh Lemon Balm Spray</a></li>
              <li>💛 <a href="${AMAZON_LINKS.necklace}" target="_blank" rel="noopener noreferrer">Encouragement Necklace</a></li>
              <li>🐵 <a href="${AMAZON_LINKS.zenMonkey}" target="_blank" rel="noopener noreferrer">The Zen Monkey and The Lotus Flower</a></li>
            </ul>
          </div>
        `;
      }

      if (feeling === "Irritable") {
        return `
          <div class="soft-box">
            <strong>🌿 Optional Comfort Boosts</strong>
            <ul>
              <li>💍 <a href="${AMAZON_LINKS.fidgetRings}" target="_blank" rel="noopener noreferrer">Fidget Rings</a></li>
              <li>🧘 <a href="${AMAZON_LINKS.anxietyRing}" target="_blank" rel="noopener noreferrer">Anti-Anxiety Ring</a></li>
              <li>🌸 <a href="${AMAZON_LINKS.locket}" target="_blank" rel="noopener noreferrer">Aromatherapy Locket Diffuser</a></li>
            </ul>
          </div>
        `;
      }

      return `
        <div class="soft-box">
          <strong>🌿 Optional Comfort Boosts</strong>
          <ul>
            <li>🌿 <a href="${AMAZON_LINKS.canIFresh}" target="_blank" rel="noopener noreferrer">Can-i Fresh Lemon Balm Spray</a></li>
            <li>🐵 <a href="${AMAZON_LINKS.zenMonkey}" target="_blank" rel="noopener noreferrer">The Zen Monkey and The Lotus Flower</a></li>
            <li>💍 <a href="${AMAZON_LINKS.fidgetRings}" target="_blank" rel="noopener noreferrer">Fidget Rings</a></li>
          </ul>
        </div>
      `;
    }

    function buildBookCard() {
      return `
        <div class="support-card" id="bookCard" style="display:none;">
          <h3>📘 Gentle Extra Support</h3>
          <p><strong>${BOOK_TITLE}</strong></p>
          <p>A reflective guide centered on joyful movement, emotional release, and finding calm through gentle rhythm and daily practice.</p>
          <p><a href="${BOOK_LINK}" target="_blank" rel="noopener noreferrer">Open my book</a></p>
        </div>
      `;
    }

    function buildSupportSelector(productsHtml) {
      return `
        <div class="support-selector">
          <label for="supportChoice">Want a little extra support?</label>
          <select id="supportChoice" onchange="toggleSupport(this.value)">
            <option value="products">Show comfort tools</option>
            <option value="book">Show my book</option>
            <option value="both">Show both</option>
          </select>

          <div id="productsCard">${productsHtml}</div>
          ${buildBookCard()}
        </div>
      `;
    }

    function toggleSupport(value) {
      const productsCard = document.getElementById("productsCard");
      const bookCard = document.getElementById("bookCard");
      if (!productsCard || !bookCard) return;

      if (value === "products") {
        productsCard.style.display = "block";
        bookCard.style.display = "none";
      } else if (value === "book") {
        productsCard.style.display = "none";
        bookCard.style.display = "block";
      } else {
        productsCard.style.display = "block";
        bookCard.style.display = "block";
      }
    }

    function generateCalm() {
      const stress = parseInt(document.getElementById("stress").value);
      const feeling = document.getElementById("feeling").value;
      const time = document.getElementById("time").value;
      const place = document.getElementById("place").value;
      const result = document.getElementById("result");

      let title = "🌿 Your Calm Reset Plan";
      let intro = "";
      let breathe = "";
      let move = "";
      let food = "";
      let environment = "";
      let bonus = "";

      if (stress >= 8 && feeling === "Anxious") {
        intro = "You're feeling anxious — let's gently slow things down.";
        breathe = "🫁 <strong>Breathe:</strong> Try box breathing. Inhale for 4, hold for 4, exhale for 4, hold for 4.";
        move = "🧘 <strong>Move:</strong> Drop your shoulders, unclench your jaw, and press both feet into the floor.";
        food = "🍵 <strong>Sip:</strong> Cool water slowly, or warm mint tea if available.";
        environment = "🌸 <strong>Settle:</strong> Lower noise, dim the lights, or close your eyes for a few seconds.";
        bonus = "Bonus suggestion: Remind yourself, “I am safe in this moment.”";
      } else if (feeling === "Anxious") {
        intro = "You're feeling anxious — let's bring things down a notch.";
        breathe = "🫁 <strong>Breathe:</strong> Inhale for 4 and exhale for 6, slowly and gently.";
        move = "🧘 <strong>Move:</strong> Relax your shoulders and soften your hands.";
        food = "🍵 <strong>Sip:</strong> Mint tea, warm water, or cool water slowly.";
        environment = "🌸 <strong>Settle:</strong> Find a quieter corner and pause for a moment.";
        bonus = "Bonus suggestion: Lavender can add a gentle feeling of comfort.";
      } else if (feeling === "Tired") {
        intro = "Your energy is low — let's gently restore it.";
        breathe = "🫁 <strong>Breathe:</strong> Take 3 deep breaths with a long, slow exhale.";
        move = "🧘 <strong>Move:</strong> Reach arms overhead, stretch your neck gently, and open your chest.";
        food = "🍵 <strong>Sip:</strong> Green tea, peppermint tea, lemon water, or cool cucumber slices.";
        environment = "🌸 <strong>Refresh:</strong> Sit near a window or step outside for fresh air if you can.";
        bonus = "Bonus suggestion: A cool splash of water and a short standing stretch can wake up your system.";
      } else if (feeling === "Overwhelmed") {
        intro = "You're carrying a lot right now — let's simplify things.";
        breathe = "🫁 <strong>Breathe:</strong> Inhale for 4 and exhale for 6 for one full minute.";
        move = "🧘 <strong>Move:</strong> Roll your shoulders back slowly 5 times and loosen your hands.";
        food = "🍵 <strong>Sip:</strong> Warm herbal tea, mint, or a few slow sips of water.";
        environment = "🌸 <strong>Simplify:</strong> Clear one small space around you and focus on only the next step.";
        bonus = "Bonus suggestion: Lavender scent can help create a gentler mood.";
      } else if (feeling === "Irritable") {
        intro = "You're feeling on edge — let's cool things down.";
        breathe = "🫁 <strong>Breathe:</strong> Inhale deeply through your nose and exhale slowly through your mouth.";
        move = "🧘 <strong>Move:</strong> Walk slowly for one minute or do a standing forward fold if comfortable.";
        food = "🍵 <strong>Sip:</strong> Cold water, mint tea, or a light snack if you have not eaten.";
        environment = "🌸 <strong>Cool down:</strong> Step away from noise and reduce stimulation for a few moments.";
        bonus = "Bonus suggestion: A calm instrumental playlist may help soften the edge.";
      } else if (feeling === "Foggy") {
        intro = "Your mind feels cloudy — let's clear some space.";
        breathe = "🫁 <strong>Breathe:</strong> Take 5 steady breaths, slightly longer on the exhale.";
        move = "🧘 <strong>Move:</strong> Stretch your arms, rotate your neck gently, and sit or stand tall.";
        food = "🍵 <strong>Sip:</strong> Green tea, lemon water, mint, or something cool and fresh like cucumber.";
        environment = "🌸 <strong>Brighten:</strong> Open blinds, add light, and reduce clutter in your view.";
        bonus = "Bonus suggestion: One small task completed can help clear mental fog.";
      } else {
        intro = "Let's take a small moment to reset.";
        breathe = "🫁 <strong>Breathe:</strong> Slow your breathing and soften your exhale.";
        move = "🧘 <strong>Move:</strong> Gently sway, stretch, or loosen your shoulders.";
        food = "🍵 <strong>Sip:</strong> Warm tea or cool water.";
        environment = "🌸 <strong>Settle:</strong> Find a quiet, softer space for a minute.";
        bonus = "Bonus suggestion: A calming scent like lavender may help.";
      }

      if (time === "15") {
        bonus += " Since you have a little more time, add a gentle yoga stretch or a short quiet walk.";
      }

      if (place === "At work") {
        environment += " Keep it simple and discreet so it feels doable where you are.";
      } else if (place === "On the go") {
        environment += " Focus on quick, portable calm: breath, posture, and a few grounding seconds.";
      } else if (place === "At home") {
        environment += " Home is a great place to add tea, a blanket, soft music, or a calming scent.";
      }

      const productsHtml = buildProducts(feeling);
      const supportSelectorHtml = buildSupportSelector(productsHtml);

      result.innerHTML = `
        <h2>${title}</h2>
        <div class="intro-line">${intro}</div>
        <div class="result-item">${breathe}</div>
        <div class="result-item">${move}</div>
        <div class="result-item">${food}</div>
        <div class="result-item">${environment}</div>
        <div class="soft-box">${bonus}</div>
        ${supportSelectorHtml}
      `;

      result.style.display = "block";
      toggleSupport("products");
      result.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    updateStressValue();
  </script>
</body>
</html>
